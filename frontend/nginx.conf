server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location /api/ {
    # Resolve "backend" lazily (per-request) instead of at startup, so this
    # container still boots when there's no "backend" host to find (e.g. when
    # deployed as a standalone service with VITE_API_BASE_URL set, which makes
    # the frontend call the backend directly and never hit this location).
    resolver 127.0.0.11 valid=10s;
    set $backend_upstream http://backend:8000;
    proxy_pass $backend_upstream/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}